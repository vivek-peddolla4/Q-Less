version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    # Persist queue data across restarts
    volumes:
      - redis_data:/data
    # Health check: ping Redis every 10s; backend waits for healthy status
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    restart: always
    environment:
      - PORT=5000
    # Health check: call the /health endpoint we added to app.py
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_URL=http://ai-service:5000
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - FROM_EMAIL=${FROM_EMAIL}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_FROM_PHONE=${TWILIO_FROM_PHONE}
    # Wait for Redis AND ai-service to be healthy before starting
    depends_on:
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    restart: always
    # Persist uploaded medical documents across restarts
    volumes:
      - uploads_data:/app/uploads
    # Health check: call the Express API
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/api/auth/login"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_AI_SERVICE_URL=${VITE_AI_SERVICE_URL}
    ports:
      - "80:80"
    # Wait for backend to be healthy before starting
    depends_on:
      backend:
        condition: service_healthy
    restart: always

volumes:
  redis_data:
  uploads_data:
