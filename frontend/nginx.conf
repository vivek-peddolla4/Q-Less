server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ──────────────────────────────────────────────
    # React Router support:
    # All routes that don't match a real file fall
    # back to index.html so React handles routing.
    # Without this, refreshing /dashboard gives 404.
    # ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ──────────────────────────────────────────────
    # Cache static assets aggressively (JS, CSS, images)
    # Vite fingerprints filenames so this is safe.
    # ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ──────────────────────────────────────────────
    # Security headers
    # ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ──────────────────────────────────────────────
    # Gzip compression for faster load times
    # ──────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ──────────────────────────────────────────────
    # Custom error pages
    # ──────────────────────────────────────────────
    error_page 404 /index.html;
}
