services:
  # 1. AI Triage Service (Python Flask)
  - type: web
    name: qless-ai-service
    plan: free
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: ai_service
    envVars:
      - key: PORT
        value: 5000

  # 2. Backend REST API & Socket Server (Node/Express)
  - type: web
    name: qless-backend
    plan: free
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb+srv://peddollavivek3_db_user:Vivek9347@cluster0.cwxatqx.mongodb.net/qless?retryWrites=true&w=majority&appName=Cluster0
      - key: JWT_SECRET
        value: dc51713d2a6245d278f3cb508718b9a2ba24923d4cf5f5b71642447e5d26febf22f7dfcff9d8bce8631733cd7712c96ba19249263c1a66db2fdfd1c086a4a274
      # REDIS_URL will be input by the user on Render (using their free Upstash URL)
      - key: REDIS_URL
        sync: false
      - key: AI_SERVICE_URL
        value: http://qless-ai-service:5000

  # 3. Frontend Client App (Vite Static Site with automatic HTTPS)
  - type: web
    name: qless-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      # Inject the live backend URL with HTTPS generated by Render into the client build
      - key: VITE_API_URL
        value: https://qless-backend.onrender.com
      # Inject the live AI service URL with HTTPS generated by Render into the client build
      - key: VITE_AI_SERVICE_URL
        value: https://qless-ai-service.onrender.com
