services:
  # 1. Managed Redis Queue Database
  - type: redis
    name: qless-redis
    ipAllowList: [] # Secure: only accessible within the Render internal network

  # 2. AI Triage Service (Python Flask)
  - type: web
    name: qless-ai-service
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: ai_service
    envVars:
      - key: PORT
        value: 5000

  # 3. Backend REST API & Socket Server (Node/Express)
  - type: web
    name: qless-backend
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: backend
    envVars:
      - key: PORT
        value: 8000
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        value: mongodb+srv://peddollavivek3_db_user:Vivek9347@cluster0.cwxatqx.mongodb.net/qless?retryWrites=true&w=majority&appName=Cluster0
      - key: JWT_SECRET
        value: dc51713d2a6245d278f3cb508718b9a2ba24923d4cf5f5b71642447e5d26febf22f7dfcff9d8bce8631733cd7712c96ba19249263c1a66db2fdfd1c086a4a274
      - key: REDIS_URL
        fromService:
          type: redis
          name: qless-redis
          property: connectionString
      - key: AI_SERVICE_URL
        fromService:
          type: web
          name: qless-ai-service
          property: url

  # 4. Frontend Client App (Vite Static Site with automatic HTTPS)
  - type: web
    name: qless-frontend
    runtime: static
    buildCommand: npm run build
    staticPublishPath: dist
    rootDir: frontend
    envVars:
      # Inject the live backend URL with HTTPS generated by Render into the client build
      - key: VITE_API_URL
        fromService:
          type: web
          name: qless-backend
          property: url
      # Inject the live AI service URL with HTTPS generated by Render into the client build
      - key: VITE_AI_SERVICE_URL
        fromService:
          type: web
          name: qless-ai-service
          property: url
